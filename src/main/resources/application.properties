spring.application.name=service-emprunt
server.port=8083

# ── Base de données ──────────────────────────────────────────
# "sslMode=DISABLED" remplace useSSL=false (driver 8.x)
# "sessionVariables=sql_mode=..." force MySQL à se déclarer en 8.x
spring.datasource.url=jdbc:mysql://localhost:3306/bibliotheque_emprunt?createDatabaseIfNotExist=true&serverTimezone=UTC&sslMode=DISABLED
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ──────────────────────────────────────────
# NE PAS spécifier dialect ni database-platform
# Hibernate le détecte seul via le driver connector 8.3.0
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ── Eureka désactivé en dev ───────────────────────────────────
eureka.client.enabled=false
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false
eureka.instance.secure-port-enabled=false
eureka.instance.non-secure-port-enabled=true
eureka.instance.non-secure-port=8083
eureka.instance.ip-address=127.0.0.1
eureka.instance.prefer-ip-address=true
spring.cloud.discovery.enabled=false

# ── URLs microservices ────────────────────────────────────────
service.livre.url=http://localhost:8081
service.emprunteur.url=http://localhost:8082

# ── Swagger ───────────────────────────────────────────────────
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.try-it-out-enabled=true

