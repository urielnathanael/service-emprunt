# Configuration de test - base H2 en mémoire (pas besoin de MySQL)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Désactiver Eureka en test
eureka.client.enabled=false
spring.cloud.discovery.enabled=false

# URLs fictives pour les clients HTTP (mockées dans les tests)
service.livre.url=http://localhost:8081
service.emprunteur.url=http://localhost:8082

# Désactiver Swagger en test (optionnel)
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
